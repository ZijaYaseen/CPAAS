# ==========================================================================
# Local development stack.
# Postgres lives on Neon (cloud) — set DATABASE_URL in .env. We only run
# Redis locally here; backend/frontend/workers run as containers that read
# DATABASE_URL from .env and connect to Neon.
# ==========================================================================
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - /app/.venv          # keep the container's Linux .venv (don't let host shadow it)
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A src.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - /app/.venv          # keep the container's Linux .venv (don't let host shadow it)
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  redis-data:
