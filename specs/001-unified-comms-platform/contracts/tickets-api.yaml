openapi: 3.0.3
info:
  title: Tickets API
  description: Support ticket management
  version: 1.0.0

paths:
  /tickets:
    get:
      summary: List tickets
      tags: [Tickets]
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, assigned, in_progress, resolved, closed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, normal, high, urgent]
      responses:
        '200':
          description: List of tickets

    post:
      summary: Create ticket
      tags: [Tickets]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, contact_id]
              properties:
                title:
                  type: string
                description:
                  type: string
                contact_id:
                  type: string
                  format: uuid
                conversation_id:
                  type: string
                  format: uuid
                priority:
                  type: string
                  enum: [low, normal, high, urgent]
                sla_hours:
                  type: integer
      responses:
        '201':
          description: Ticket created

  /tickets/{ticket_id}:
    get:
      summary: Get ticket details
      tags: [Tickets]
      security:
        - cookieAuth: []
      parameters:
        - name: ticket_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ticket details

    patch:
      summary: Update ticket
      tags: [Tickets]
      security:
        - cookieAuth: []
      parameters:
        - name: ticket_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                priority:
                  type: string
                assigned_to_user_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Ticket updated

  /tickets/{ticket_id}/escalate:
    post:
      summary: Escalate ticket
      tags: [Tickets]
      security:
        - cookieAuth: []
      parameters:
        - name: ticket_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Ticket escalated
